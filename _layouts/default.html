<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ page.title }}{% unless page.title == site.title %} — {{ site.title }}{% endunless %}</title>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; max-width: 40rem; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; color: #222; }
  a { color: #0645ad; }
  a:visited { color: #0b0080; }
  nav { margin-bottom: 2rem; padding-bottom: 0.5rem; border-bottom: 1px solid #ddd; }
  nav a { margin-right: 1rem; }
  img { max-width: 100%; height: auto; }
  blockquote { border-left: 3px solid #ccc; margin: 1em 0; padding: 0.25em 1em; color: #555; }
  pre, code { font-family: ui-monospace, Menlo, monospace; }
  pre { background: #f4f4f4; padding: 0.75em; overflow-x: auto; }
  h1, h2, h3 { line-height: 1.2; }
  footer { margin-top: 3rem; padding-top: 0.5rem; border-top: 1px solid #ddd; color: #777; font-size: 0.9em; }
</style>
</head>
<body>
<nav>
  <a href="/">Home</a>
  <a href="/about/">About</a>
  <a href="/my-blog/">Blog</a>
  <a href="/music/">Music</a>
  <a href="/more/">More</a>
</nav>
<main>
{{ content }}
</main>
<footer>
  &copy; {{ "now" | date: "%Y" }} Craig Bass
</footer>
</body>
</html>
