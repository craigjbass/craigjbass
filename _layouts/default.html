<!doctype html>
<html lang="en">
<head>
  {%- include head.html -%}
</head>
<body>
  <div class="frame">
    {%- include tape.html -%}
    {%- include marquee.html -%}

    {% if page.layout == "default" and page.url != "/" %}
    <article class="page">
      <h1 class="page-title">{{ page.title }}</h1>
      {{ content }}
    </article>
    {% else %}
    {{ content }}
    {% endif %}

    {%- include footer.html -%}
  </div>
  <script src="{{ '/assets/js/portrait.js' | relative_url }}"></script>
</body>
</html>
